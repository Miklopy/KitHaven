name: Deploy to Shopify

on:
  push:
    branches:
      - main

jobs:
  deploy:
    name: Deploy Theme to kithaven-2.myshopify.com
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install Shopify CLI
        run: npm install -g @shopify/cli@3.92.1

      - name: Test API connection
        run: |
          curl -s -o /dev/null -w "%{http_code}" \
            -X POST "https://kithaven-2.myshopify.com/admin/api/2024-10/graphql.json" \
            -H "Content-Type: application/json" \
            -H "X-Shopify-Access-Token: ${{ secrets.SHOPIFY_ACCESS_TOKEN }}" \
            -d '{"query":"{ shop { name } }"}'

      - name: Push theme to production
        run: |
          shopify theme push \
            --store=kithaven-2.myshopify.com \
            --theme=${{ secrets.SHOPIFY_THEME_ID }} \
            --nodelete
        env:
          SHOPIFY_CLI_THEME_TOKEN: ${{ secrets.SHOPIFY_ACCESS_TOKEN }}
