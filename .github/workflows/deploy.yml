name: Deploy to Shopify

on:
  push:
    branches:
      - main

jobs:
  deploy:
    name: Deploy Theme to kithaven-2.myshopify.com
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install Shopify CLI
        run: npm install -g @shopify/cli@3.92.1

      - name: Verify CLI version
        run: shopify version

      - name: Debug token
        run: echo "Token length is ${#SHOPIFY_CLI_THEME_TOKEN} chars, starts with ${SHOPIFY_CLI_THEME_TOKEN:0:6}"
        env:
          SHOPIFY_CLI_THEME_TOKEN: ${{ secrets.SHOPIFY_ACCESS_TOKEN }}

      - name: Push theme to production
        run: |
          shopify theme push \
            --store=kithaven-2.myshopify.com \
            --theme=${{ secrets.SHOPIFY_THEME_ID }} \
            --nodelete
        env:
          SHOPIFY_CLI_THEME_TOKEN: ${{ secrets.SHOPIFY_ACCESS_TOKEN }}
          SHOPIFY_FLAG_PASSWORD: ${{ secrets.SHOPIFY_ACCESS_TOKEN }}
          SHOPIFY_FLAG_STORE: kithaven-2.myshopify.com
